services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - leonobitech-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.leonobitech.com`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.middlewares.auth-traefik.basicauth.users=${TRAEFIK_AUTH}"
      - "traefik.http.routers.traefik.middlewares=auth-traefik@docker"
      - "traefik.http.middlewares.n8n-secure.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.n8n-secure.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.n8n-secure.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.n8n-secure.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.n8n-secure.headers.SSLHost=${DOMAIN_NAME}"
      - "traefik.http.middlewares.n8n-secure.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.n8n-secure.headers.STSPreload=true"

  redis_core:
    image: redis:latest
    container_name: redis_core
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --databases ${REDIS_DATABASES}
    env_file:
      - ./repositories/redis/.env
    volumes:
      - redis_core_data:/data
    networks:
      - leonobitech-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  core:
    container_name: core
    build:
      context: ./repositories/core
    image: leonobitech/core:v1.0
    restart: unless-stopped
    env_file:
      - ./repositories/core/.env
    volumes:
      - ./repositories/core/keys:/app/keys:ro
    networks:
      - leonobitech-net
    depends_on:
      redis_core:
        condition: service_healthy
      traefik:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=Host(`${SUBDOMAINCORE}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.core.entrypoints=websecure"
      - "traefik.http.routers.core.tls.certresolver=le"
      - "traefik.http.services.core.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/health', res => process.exit(res.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  n8n_main:
      image: n8nio/n8n:latest
      container_name: n8n_main
      restart: unless-stopped
      env_file:
        - ./repositories/n8n/.env
      volumes:
        - n8n_data_main:/home/node/.n8n
      networks:
        - leonobitech-net
      depends_on:
        postgres_n8n:
          condition: service_healthy
      labels:
        - traefik.enable=true
        - traefik.http.routers.n8n_ui.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
        - traefik.http.routers.n8n_ui.entrypoints=websecure
        - traefik.http.routers.n8n_ui.tls=true
        - traefik.http.routers.n8n_ui.tls.certresolver=le
        - traefik.http.routers.n8n_ui.service=n8n_ui
        - traefik.http.services.n8n_ui.loadbalancer.server.port=5678
        - traefik.http.routers.n8n_ui.middlewares=n8n-secure@docker,auth-n8n@docker
        - traefik.http.middlewares.auth-n8n.basicauth.users=${N8N_AUTH}
        - traefik.http.routers.n8n_webhooktest.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`) && PathPrefix(`/webhook-test`)
        - traefik.http.routers.n8n_webhooktest.entrypoints=websecure
        - traefik.http.routers.n8n_webhooktest.tls=true
        - traefik.http.routers.n8n_webhooktest.tls.certresolver=le
        - traefik.http.routers.n8n_webhooktest.service=n8n_ui

  n8n_webhook_1:
    image: n8nio/n8n:latest
    container_name: n8n_webhook_1
    restart: unless-stopped
    env_file:
      - ./repositories/n8n/.env
    command: webhook
    volumes:
      - n8n_data_webhook_1:/home/node/.n8n
    networks:
      - leonobitech-net
    depends_on:
      postgres_n8n:
        condition: service_healthy
      redis_n8n:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n_webhook.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`) && PathPrefix(`/webhook`)
      - traefik.http.routers.n8n_webhook.entrypoints=websecure
      - traefik.http.routers.n8n_webhook.tls.certresolver=le
      - traefik.http.routers.n8n_webhook.middlewares=n8n-secure@docker
      - traefik.http.services.n8n_webhook_1.loadbalancer.server.port=5678

  n8n_worker_1:
    image: n8nio/n8n:latest
    container_name: n8n_worker_1
    restart: unless-stopped
    env_file:
      - ./repositories/n8n/.env
    command: worker
    volumes:
      - n8n_data_worker_1:/home/node/.n8n
    networks:
      - leonobitech-net
    depends_on:
      postgres_n8n:
        condition: service_healthy
      redis_n8n:
        condition: service_healthy
    labels: []

  redis_n8n:
    image: redis:latest
    container_name: redis_n8n
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - leonobitech-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  postgres_n8n:
    image: postgres:latest
    container_name: postgres_n8n
    restart: unless-stopped
    env_file:
      - ./repositories/n8n/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leonobitech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s

volumes:
  redis_core_data:
  n8n_data_main:
  n8n_data_webhook_1:
  n8n_data_worker_1:
  redis_data:
  postgres_data:

networks:
  leonobitech-net:
    driver: bridge
    ipam:
      driver: default
