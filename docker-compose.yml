services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json:rw
    networks:
      - leonobitech-net
    labels:
      - "traefik.enable=true"

      ############################################
      ## 🔐 Middleware: Autenticación básica para el dashboard de Traefik
      ############################################
      - "traefik.http.middlewares.auth-traefik.basicauth.users=${TRAEFIK_AUTH}"

      ############################################
      # 🛡️ Middleware: Headers de seguridad
      ############################################
      - "traefik.http.middlewares.traefik-secure.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.traefik-secure.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.traefik-secure.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.traefik-secure.headers.STSPreload=true"
      - "traefik.http.middlewares.traefik-secure.headers.SSLHost=${DOMAIN_NAME}"
      - "traefik.http.middlewares.traefik-secure.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.traefik-secure.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.traefik-secure.headers.frameDeny=true"
      - "traefik.http.middlewares.traefik-secure.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.traefik-secure.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; frame-ancestors 'none';"

      ############################################
      # 📵 Middleware: Bloqueo de rastreadores básicos
      ############################################
      - "traefik.http.middlewares.block-trackers.headers.customResponseHeaders.X-Blocked-By=Traefik"
      - "traefik.http.middlewares.block-trackers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; connect-src 'self';"

      ############################################
      # 🚪 Router: acceso al dashboard
      ############################################
      - "traefik.http.routers.traefik.rule=Host(`traefik.leonobitech.com`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth-traefik@docker,block-trackers@docker,traefik-secure@docker"

  redis_core:
    image: redis:latest
    container_name: redis_core
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --databases ${REDIS_DATABASES}
    env_file:
      - ./repositories/redis/.env
    volumes:
      - redis_core_data:/data
    networks:
      - leonobitech-net
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  core:
    container_name: core
    build:
      context: ./repositories/core
    image: leonobitech/core:v1.0
    restart: unless-stopped
    env_file:
      - ./repositories/core/.env
    volumes:
      - ./repositories/core/keys:/app/keys:ro
    networks:
      - leonobitech-net
    depends_on:
      redis_core:
        condition: service_healthy
      traefik:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"

      ############################################
      # 🛡️ Middleware: Headers de seguridad (core-secure)
      ############################################
      - "traefik.http.middlewares.core-secure.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.core-secure.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.core-secure.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.core-secure.headers.STSPreload=true"
      - "traefik.http.middlewares.core-secure.headers.SSLHost=${DOMAIN_NAME}"
      - "traefik.http.middlewares.core-secure.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.core-secure.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.core-secure.headers.frameDeny=true"
      - "traefik.http.middlewares.core-secure.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.core-secure.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; frame-ancestors 'none';"

      ############################################
      # 🛡️ Middleware: Bloqueo básico de trackers (block-trackers)
      ############################################
      - "traefik.http.middlewares.block-trackers.headers.customResponseHeaders.X-Blocked-By=Traefik"
      - "traefik.http.middlewares.block-trackers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; connect-src 'self';"

      ############################################
      # 🌐 Router principal del microservicio core
      ############################################
      - "traefik.http.routers.core.rule=Host(`${SUBDOMAINCORE}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.core.entrypoints=websecure"
      - "traefik.http.routers.core.tls.certresolver=le"
      - "traefik.http.services.core.loadbalancer.server.port=8000"

      ############################################
      # 🔐 Aplicación de middlewares al router core
      ############################################
      - "traefik.http.routers.core.middlewares=block-trackers@docker,core-secure@docker"

    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8000/health', res => process.exit(res.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s


  n8n_main:
    image: n8nio/n8n:latest
    container_name: n8n_main
    restart: unless-stopped
    env_file:
      - ./repositories/n8n/.env
    volumes:
      - n8n_data_main:/home/node/.n8n
    networks:
      - leonobitech-net
    depends_on:
      postgres_n8n:
        condition: service_healthy
    labels:
      - "traefik.enable=true"

      ############################################
      # 🔐 Middleware que redirige autenticación a /security/verify-admin
      ############################################
      - "traefik.http.middlewares.forward-auth-n8n.forwardauth.address=https://core.leonobitech.com/security/verify-admin"
      - "traefik.http.middlewares.forward-auth-n8n.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.forward-auth-n8n.forwardauth.authResponseHeaders=X-User-Id,X-User-Role"
      - "traefik.http.middlewares.forward-auth-n8n.forwardauth.authRequestHeaders=Cookie"

      ############################################
      # 🛡️ Middleware: headers de seguridad para UI
      ############################################
      - "traefik.http.middlewares.n8n-secure.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.n8n-secure.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.n8n-secure.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.n8n-secure.headers.STSPreload=true"
      - "traefik.http.middlewares.n8n-secure.headers.SSLHost=${DOMAIN_NAME}"
      - "traefik.http.middlewares.n8n-secure.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.n8n-secure.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.n8n-secure.headers.frameDeny=true"
      - "traefik.http.middlewares.n8n-secure.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.n8n-secure.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src *; img-src *; frame-ancestors 'self';"

      ############################################
      # 🌐 Router principal de acceso UI n8n
      ############################################
      - "traefik.http.routers.n8n_ui.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)"
      - "traefik.http.routers.n8n_ui.entrypoints=websecure"
      - "traefik.http.routers.n8n_ui.tls=true"
      - "traefik.http.routers.n8n_ui.tls.certresolver=le"
      - "traefik.http.routers.n8n_ui.service=n8n_ui"
      - "traefik.http.services.n8n_ui.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n_ui.middlewares=forward-auth-n8n@docker,n8n-secure@docker"

      ############################################
      # 🚀 Webhook público controlado (/webhook-test)
      ############################################
      - "traefik.http.routers.n8n_webhooktest.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`) && PathPrefix(`/webhook-test`)"
      - "traefik.http.routers.n8n_webhooktest.entrypoints=websecure"
      - "traefik.http.routers.n8n_webhooktest.tls=true"
      - "traefik.http.routers.n8n_webhooktest.tls.certresolver=le"
      - "traefik.http.routers.n8n_webhooktest.service=n8n_ui"
      # 👇 Podés aplicar headers también si querés seguridad en el webhook
      # - "traefik.http.routers.n8n_webhooktest.middlewares=n8n-secure@docker"


  n8n_webhook_1:
    image: n8nio/n8n:latest
    container_name: n8n_webhook_1
    restart: unless-stopped
    env_file:
      - ./repositories/n8n/.env
    command: webhook
    volumes:
      - n8n_data_webhook_1:/home/node/.n8n
    networks:
      - leonobitech-net
    depends_on:
      postgres_n8n:
        condition: service_healthy
      redis_n8n:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"

      ############################################
      # 🛡️ Middleware: seguridad para webhooks
      ############################################
      - "traefik.http.middlewares.n8n-webhook-secure.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.n8n-webhook-secure.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.n8n-webhook-secure.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.n8n-webhook-secure.headers.STSPreload=true"
      - "traefik.http.middlewares.n8n-webhook-secure.headers.SSLHost=${DOMAIN_NAME}"
      - "traefik.http.middlewares.n8n-webhook-secure.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.n8n-webhook-secure.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.n8n-webhook-secure.headers.referrerPolicy=no-referrer"

      ############################################
      # 🌐 Router para /webhook
      ############################################
      - "traefik.http.routers.n8n_webhook.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`) && PathPrefix(`/webhook`)"
      - "traefik.http.routers.n8n_webhook.entrypoints=websecure"
      - "traefik.http.routers.n8n_webhook.tls.certresolver=le"
      - "traefik.http.routers.n8n_webhook.middlewares=n8n-webhook-secure@docker"
      - "traefik.http.services.n8n_webhook_1.loadbalancer.server.port=5678"


  n8n_worker_1:
    image: n8nio/n8n:latest
    container_name: n8n_worker_1
    restart: unless-stopped
    env_file:
      - ./repositories/n8n/.env
    command: worker
    volumes:
      - n8n_data_worker_1:/home/node/.n8n
    networks:
      - leonobitech-net
    depends_on:
      postgres_n8n:
        condition: service_healthy
      redis_n8n:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp


  redis_n8n:
    image: redis:latest
    container_name: redis_n8n
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_N8N_PASSWORD} --databases 1
    env_file:
      - ./repositories/n8n/.env
    volumes:
      - redis_data:/data
    networks:
      - leonobitech-net
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_N8N_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres_n8n:
    image: postgres:latest
    container_name: postgres_n8n
    restart: unless-stopped
    env_file:
      - ./repositories/n8n/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leonobitech-net
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER_N8N}", "-d", "${POSTGRES_DB_N8N}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  
  postgres_odoo:
    image: postgres:latest
    container_name: postgres_odoo
    restart: unless-stopped
    env_file:
      - ./repositories/odoo/.env
    volumes:
      - odoo_postgres_data:/var/lib/postgresql/data
    networks:
      - leonobitech-net
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER_ODOO}", "-d", "${POSTGRES_DB_ODOO}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  odoo:
    image: odoo:latest
    container_name: odoo
    restart: unless-stopped
    env_file:
      - ./repositories/odoo/.env
    volumes:
      - odoo_data:/var/lib/odoo
    networks:
      - leonobitech-net
    depends_on:
      postgres_odoo:
        condition: service_healthy
      traefik:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    command: --no-database-list
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"

      ############################################
      # 🔐 Middleware que redirige autenticación a /security/verify-admin
      ############################################
      - "traefik.http.middlewares.forward-auth-odoo.forwardauth.address=https://core.leonobitech.com/security/verify-admin"
      - "traefik.http.middlewares.forward-auth-odoo.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.forward-auth-odoo.forwardauth.authRequestHeaders=Cookie"
      - "traefik.http.middlewares.forward-auth-odoo.forwardauth.authResponseHeaders=X-User-Id,X-User-Role"
      
      ############################################
      # 🛡️ Middleware: headers de seguridad Odoo (CSP corregido)
      ############################################
      - "traefik.http.middlewares.odoo-secure.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.odoo-secure.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.odoo-secure.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.odoo-secure.headers.STSPreload=true"
      - "traefik.http.middlewares.odoo-secure.headers.SSLHost=${DOMAIN_NAME}"
      - "traefik.http.middlewares.odoo-secure.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.odoo-secure.headers.contentTypeNosniff=true"
      # - "traefik.http.middlewares.odoo-secure.headers.frameDeny=true"
      - "traefik.http.middlewares.odoo-secure.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.odoo-secure.headers.contentSecurityPolicy=script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src * data:; connect-src *; frame-ancestors 'self';"


      ############################################
      # 🌐 Router principal de Odoo
      ############################################
      - "traefik.http.routers.odoo.rule=Host(`odoo.${DOMAIN_NAME}`)"
      - "traefik.http.routers.odoo.entrypoints=websecure"
      - "traefik.http.routers.odoo.tls=true"
      - "traefik.http.routers.odoo.tls.certresolver=le"
      - "traefik.http.routers.odoo.service=odoo"
      - "traefik.http.services.odoo.loadbalancer.server.port=8069"

      ############################################
      # 📦 Middlewares aplicados al router
      ############################################
      - "traefik.http.routers.odoo.middlewares=odoo-secure@docker"

volumes:
  redis_core_data:
  n8n_data_main:
  n8n_data_webhook_1:
  n8n_data_worker_1:
  redis_data:
  postgres_data:
  odoo_postgres_data:
  odoo_data:

networks:
  leonobitech-net:
    driver: bridge
    ipam:
      driver: default
