      - POSTGRES_PORT=${POSTGRES_PORT_CW}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE_CW}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME_CW}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_CW}

      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - SIDEKIQ_CONCURRENCY=2
      - MALLOC_ARENA_MAX=2
      - RUBY_YJIT_ENABLE=0

    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    volumes:
      - chatwoot_data:/app/storage
    depends_on:
      - redis_chatwoot
      - postgres_chatwoot
    networks:
      - leonobitech-net
    healthcheck:
      test: ["CMD", "pgrep", "sidekiq"]
      interval: 30s
      timeout: 10s
      retries: 3

    stop_grace_period: 60s
    cpus: 0.5
    mem_limit: 576m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  leonobit:
    container_name: leonobit
    build:
      context: ./repositories/leonobit
      dockerfile: Dockerfile
    image: leonobitech/leonobit:v1.0
    restart: unless-stopped

    # Seguridad y FS inmutable
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
      - /run:rw,noexec,nosuid,nodev,size=16m
    stop_grace_period: 15s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Whisper model (ggml-base.en.bin): ~/backend/repositories/leonobit/models
    volumes:
      - ./repositories/leonobit/models:/app/models:ro

    env_file:
      - ./repositories/leonobit/.env
    environment:
      - RUST_LOG=info,leonobit=debug,axum=info,webrtc=info,tower_http=info
      - PORT=8000
      - CORS_ORIGIN=${CORS_ORIGIN}
      - ALLOWED_WS_ORIGINS=${ALLOWED_WS_ORIGINS}
      - WS_JWT_SECRET=${WS_JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - WHISPER_MODEL_PATH=${WHISPER_MODEL_PATH}

    networks:
      - leonobitech-net

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

    # Limitar CPU: whisper.cpp ggml hace spin-wait en idle (~130% sin límite)
    cpus: 1.0
    mem_limit: 512m

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=leonobitech-net"

      # 🌐 Router HTTP general (con Core Auth)
      - "traefik.http.routers.leonobit.rule=Host(`leonobit.${DOMAIN_NAME}`)"
      - "traefik.http.routers.leonobit.entrypoints=websecure"
      - "traefik.http.routers.leonobit.tls.certresolver=le"
      - "traefik.http.routers.leonobit.middlewares=core-auth@file,secure-relaxed@file"
      - "traefik.http.services.leonobit.loadbalancer.server.port=8000"

      # 🔌 Router WS dedicado (sin middlewares)
      - "traefik.http.routers.leonobit-ws.rule=Host(`leonobit.${DOMAIN_NAME}`) && PathPrefix(`/ws/`)"
      - "traefik.http.routers.leonobit-ws.entrypoints=websecure"
      - "traefik.http.routers.leonobit-ws.tls.certresolver=le"
      - "traefik.http.routers.leonobit-ws.service=leonobit"
      - "traefik.http.routers.leonobit-ws.priority=100"

      # 🌊 Rate limit suave para /ws/ (handshake)
      - "traefik.http.middlewares.ws-rl.ratelimit.average=50"
      - "traefik.http.middlewares.ws-rl.ratelimit.burst=100"
      - "traefik.http.routers.leonobit-ws.middlewares=ws-rl@docker"

      # Router HTTP para /webrtc/ sin core-auth (tiene su propia auth en Axum)
      - "traefik.http.routers.leonobit-webrtc.rule=Host(`leonobit.${DOMAIN_NAME}`) && PathPrefix(`/webrtc/`)"
      - "traefik.http.routers.leonobit-webrtc.entrypoints=websecure"
      - "traefik.http.routers.leonobit-webrtc.tls.certresolver=le"
      - "traefik.http.routers.leonobit-webrtc.service=leonobit"
      - "traefik.http.routers.leonobit-webrtc.priority=110"
      # opcional
      - "traefik.http.middlewares.webrtc-rl.ratelimit.average=30"
      - "traefik.http.middlewares.webrtc-rl.ratelimit.burst=60"
      - "traefik.http.routers.leonobit-webrtc.middlewares=webrtc-rl@docker"

  piper_tts:
    container_name: piper_tts
    build:
      context: ./repositories/piper-tts
      dockerfile: Dockerfile
    image: leonobitech/piper-tts:v1.0
    restart: unless-stopped

    # Seguridad
    user: "10002:65534"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    networks:
      - leonobitech-net

    expose:
      - "5000"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

    # Recursos (TTS es CPU-intensive)
    cpus: 2.0
    mem_limit: 1024m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  # 🔴 Redis
  redis_core_data: # Almacena los datos persistentes del Redis del Core
  redis_n8n_data: # Redis exclusivo para el ecosistema de n8n
  redis_chatwoot_data: # Redis exclusivo para Chatwoot

  # 🟢 PostgreSQL
  n8n_postgres_data: # Base de datos de n8n
  odoo_postgres_data: # Base de datos de Odoo
  baserow_postgres_data: # Base de datos de Baserow
  chatwoot_postgres_data: # Base de datos de Chatwoot

  # 🔵 Qdrant (vector search)
  qdrant_data: # Almacenamiento principal de Qdrant
  qdrant_snapshots: # Snapshots de backup/restauración de vectores

  # 🟡 n8n - nodos individuales
  n8n_data_main: # Volumen principal del nodo UI de n8n
  n8n_data_webhook_1: # Volumen del nodo exclusivo para Webhooks
  n8n_data_worker_1: # Volumen del worker de ejecución 1
  n8n_data_worker_2: # Volumen del worker de ejecución 2

  # 🟠 Baserow
  baserow_data: # Datos internos de Baserow (keys, tokens, config)
  baserow_media: # Archivos subidos por usuarios y exportaciones
  baserow_redis_data: # Redis de Baserow (caching, async)

  # 🟣 Chatwoot
  chatwoot_data: # Datos internos de Chatwoot (keys, tokens, config)

  # 🟤 Odoo
  odoo_data:
    external: false

networks:
  leonobitech-net:
    name: leonobitech-net
    driver: bridge
    ipam:
      driver: default
