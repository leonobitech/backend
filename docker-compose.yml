services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${SSL_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - leonobitech-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.leonobitech.com`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.service=api@internal"

  redis_core:
    image: redis:latest
    container_name: redis_core
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --databases ${REDIS_DATABASES}
    env_file:
      - ./repositories/redis/.env
    volumes:
      - redis_core_data:/data
    networks:
      - leonobitech-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  core:
    container_name: core
    build:
      context: ./repositories/core
    image: leonobitech/core:latest
    restart: unless-stopped
    env_file:
      - ./repositories/core/.env
    volumes:
      - ./repositories/core/keys:/app/keys:ro
    networks:
      - leonobitech-net
    depends_on:
      redis_core:
        condition: service_healthy
      traefik:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=Host(`core.leonobitech.com`)"
      - "traefik.http.routers.core.entrypoints=websecure"
      - "traefik.http.routers.core.tls.certresolver=le"
      - "traefik.http.services.core.loadbalancer.server.port=8000"
    healthcheck:
      test: [
        "CMD-SHELL",
        "node -e \"require('http').get('http://localhost:8000/health', res => process.exit(res.statusCode === 200 ? 0 : 1))\""
      ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  redis_core_data:

networks:
  leonobitech-net:
    driver: bridge
    ipam:
      driver: default
