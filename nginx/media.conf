server {
    listen 80;

    location /media/ {
        alias /baserow/media/;

        # 🚫 Evita mostrar la estructura de carpetas
        autoindex off;

        # 📉 No loguea accesos a archivos estáticos
        access_log off;

        # 📦 Cache fuerte (1 año, archivos inmutables)
        add_header Cache-Control "public, max-age=31536000, immutable";

        # 🔐 Headers de seguridad básicos
        add_header X-Served-By "Baserow-Media";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "no-referrer";

        # 🧱 Si no existe, devuelve 404
        try_files $uri $uri/ =404;
    }
}
