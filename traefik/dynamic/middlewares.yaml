# ./traefik/middlewares.yaml
#
# 🔧 Dynamic middlewares for Traefik (mounted via --providers.file.filename)
# Use with:
#   - ./traefik/middlewares.yaml:/etc/traefik/dynamic/middlewares.yaml:ro
#   - "--providers.file.filename=/etc/traefik/dynamic/middlewares.yaml"
#
# 🧠 TIP: You can use environment variables with Go templates, e.g. {{ env "DOMAIN_NAME" }}
# -----------------------------------------------------------------------------
http:
  middlewares:

    # -------------------------------------------------------------------------
    # 🔐 Shared ForwardAuth – delegates auth to Core microservice
    # -------------------------------------------------------------------------
    core-auth:
      forwardAuth:
        address: "https://core.leonobitech.com/security/verify-admin"
        trustForwardHeader: true
        authRequestHeaders:
          - "Cookie"
          - "X-Forwarded-For"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Role"
          - "Set-Cookie"
        addAuthCookiesToResponse:
          - "accessKey"
          - "clientKey"
    # -------------------------------------------------------------------------
    # 🔐 CSP personalizada para Core – permite credenciales desde frontend
    # -------------------------------------------------------------------------
    core-secure:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: >-
          geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()
        customResponseHeaders:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          connect-src 'self' https://*.leonobitech.com blob: data:;
          img-src 'self' data:;
          frame-ancestors 'self';
    # -------------------------------------------------------------------------
    # 🛡️ Strict headers – ideal for APIs or services without frontend
    # No inline JS, no external connections
    # -------------------------------------------------------------------------
    secure-strict:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; frame-ancestors 'none';"

    # -------------------------------------------------------------------------
    # 🛡️ Relaxed headers – allow inline JS and wide connect/img support
    # Use for frontends like n8n, Odoo, Baserow UI
    # -------------------------------------------------------------------------
    secure-relaxed:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"
        contentSecurityPolicy: >-
          script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://static.cloudflareinsights.com https://cdn.rs.n8n.io https://ph.n8n.io https://sentry.com;
          style-src 'self' 'unsafe-inline';
          img-src * data:;
          connect-src * blob: https://sentry.com https://static.cloudflareinsights.com;
          frame-ancestors 'self';

    # -------------------------------------------------------------------------
    # 🛡️ Basic headers – no CSP, for media or public assets
    # -------------------------------------------------------------------------
    secure-basic:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"

    # -------------------------------------------------------------------------
    # 📵 Anti-tracking policy – optional for public pages/assets
    # -------------------------------------------------------------------------
    block-trackers:
      headers:
        customResponseHeaders:
          X-Blocked-By: "Traefik"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; connect-src 'self';"

    # -------------------------------------------------------------------------
    # 🧩 secure-odoo – Middleware especial para frontend de Odoo
    # -------------------------------------------------------------------------
    # Diseñado para permitir el funcionamiento completo del frontend de Odoo:
    # - Permite inline JS y eval por dependencias internas del core
    # - Desbloquea fuentes personalizadas e íconos (font-src, img-src)
    # - Habilita iframes internos necesarios para ciertas vistas
    # - Aplica headers de seguridad avanzados sin romper UI
    # - Pensado para trabajar junto a core-auth@file como protección principal
    # -------------------------------------------------------------------------
    secure-odoo:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: false  # Odoo usa iframes internamente
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: >-
          geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"  # permite iframes desde el mismo dominio
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          font-src 'self' data:;
          img-src * data: blob:;
          connect-src * blob:;
          frame-ancestors 'self';

    # -------------------------------------------------------------------------
    # 🗂️ odoo-media – Headers para archivos y contenido estático/descargable
    # -------------------------------------------------------------------------
    # Pensado para rutas como:
    # - /web/content
    # - /web/image
    # - /web/binary/*
    # - /media (si se usa)
    # Aplica headers de seguridad sin bloquear Content-Disposition,
    # ni tipos de archivo, ni imágenes externas
    # -------------------------------------------------------------------------
    odoo-media:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        browserXSSFilter: true
        contentTypeNosniff: false  # Deshabilitado para que descargas no se rompan
        frameDeny: true
        referrerPolicy: no-referrer
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
        contentSecurityPolicy: >-
          default-src 'self';
          img-src * data: blob:;
          media-src *;
          frame-ancestors 'none';