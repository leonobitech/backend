# ./traefik/middlewares.yaml
#
# 🔧 Dynamic middlewares for Traefik (mounted via --providers.file.filename)
# Use with:
#   - ./traefik/middlewares.yaml:/etc/traefik/dynamic/middlewares.yaml:ro
#   - "--providers.file.filename=/etc/traefik/dynamic/middlewares.yaml"
#
# 🧠 TIP: You can use environment variables with Go templates, e.g. {{ env "DOMAIN_NAME" }}
# -----------------------------------------------------------------------------
http:
  # 1) Transport WS con timeouts altos (compartido por todos)
  serversTransports:
    ws-transport:
      forwardingTimeouts:
        dialTimeout: 10s
        responseHeaderTimeout: 120s
        idleConnTimeout: 3600s # 1 hora (ajusta si necesitas más)

  middlewares:
    # -------------------------------------------------------------------------
    # 🔐 Shared ForwardAuth – delegates auth to Core microservice
    # -------------------------------------------------------------------------
    core-auth:
      forwardAuth:
        address: "https://core.leonobitech.com/security/verify-admin"
        trustForwardHeader: true
        authRequestHeaders:
          - "Cookie"
          - "X-Forwarded-For"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Role"
        addAuthCookiesToResponse:
          - "accessKey"
          - "clientKey"

    # 🔒 APIs: sin cache + aisladas por sesión
    api-nostore-vary:
      headers:
        customResponseHeaders:
          Cache-Control: "no-store"
          Vary: "Cookie, Authorization"
    # -------------------------------------------------------------------------
    # 🔐 CSP personalizada para Core – permite credenciales desde frontend
    # -------------------------------------------------------------------------
    core-secure:
      headers:
        stsSeconds: 315360000
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        SSLHost: "leonobitech.com"
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: >-
          geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()
        customResponseHeaders:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          connect-src 'self' https://*.leonobitech.com wss://*.leonobitech.com blob: data:;
          img-src 'self' data:;
          frame-ancestors 'self';

    # -------------------------------------------------------------------------
    # 𞶑 Strict headers – ideal for APIs o servicios sin frontend
    # -------------------------------------------------------------------------
    secure-strict:
      headers:
        stsSeconds: 315360000
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        SSLHost: "leonobitech.com"
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; frame-ancestors 'none';"

    # -------------------------------------------------------------------------
    # 𞶑 Relaxed headers – allow inline JS and wide connect/img support
    # Use for frontends like n8n, Odoo, Baserow UI
    # -------------------------------------------------------------------------
    secure-relaxed:
      headers:
        stsSeconds: 315360000
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        SSLHost: "leonobitech.com"
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"

        accessControlAllowHeaders: "Origin,Content-Type,Accept,Authorization,X-CSRF-Token,X-Requested-With,Cookie"

        contentSecurityPolicy: >-
          script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://static.cloudflareinsights.com https://cdn.rs.n8n.io https://ph.n8n.io https://sentry.com;
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: https://sentry.com https://static.cloudflareinsights.com;
          connect-src 'self' blob: https://sentry.com https://static.cloudflareinsights.com wss://leonobit.leonobitech.com;
          frame-ancestors 'self';

    # -------------------------------------------------------------------------
    # 𞶑 Basic headers – no CSP, for media or public assets
    # -------------------------------------------------------------------------
    secure-basic:
      headers:
        stsSeconds: 315360000
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        SSLHost: "leonobitech.com"
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"
        customResponseHeaders:
          X-Frame-Options: "DENY"

    # -------------------------------------------------------------------------
    # 📵 Anti-tracking policy – optional for public pages/assets
    # -------------------------------------------------------------------------
    block-trackers:
      headers:
        customResponseHeaders:
          X-Blocked-By: "Traefik"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; connect-src 'self';"

    # -------------------------------------------------------------------------
    # 🧩 secure-odoo – Middleware especial para frontend de Odoo
    # -------------------------------------------------------------------------
    secure-odoo:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        SSLHost: "leonobitech.com"
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: >-
          geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          font-src 'self' data:;
          img-src * data: blob:;
          connect-src * blob:;
          frame-ancestors 'self';

    # -------------------------------------------------------------------------
    # 🗂️ odoo-media – Headers para archivos y contenido estático/descargable
    # -------------------------------------------------------------------------
    odoo-media:
      headers:
        stsSeconds: 315360000
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        browserXssFilter: true
        contentTypeNosniff: false
        frameDeny: true
        referrerPolicy: no-referrer
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
        contentSecurityPolicy: >-
          default-src 'self';
          img-src * data: blob:;
          media-src *;
          font-src 'self' data:;
          frame-ancestors 'none';

    #########################################
    # 🔌 WebSocket headers para /cable
    # ---------------------------------------
    # Necesario para que ActionCable (Rails)
    # funcione detrás de Traefik con wss://
    #
    # - Fuerza el proto https (evita handshake 301)
    # - Permite origen cruzado para cliente web
    # - Agrega STS y filtros anti-XSS
    #########################################
    # 2) Middleware WS neutro y seguro (compartido por todos)
    ws-safe:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        # Seguridad razonable sin interferir con WS
        browserXssFilter: true
        contentTypeNosniff: true
        referrerPolicy: "no-referrer"
        # Evita forzar frame deny en endpoints embebibles tipo Chatwoot widget
        # frameDeny: true   # <- si tienes widget embebido, mejor NO aplicarlo en WS

    #########################################
    # 🟢 Webhook Meta (WhatsApp) - Open Access
    # ---------------------------------------
    # Middleware liviano para permitir que Meta
    # valide el webhook sin errores de CSP,
    # X-Frame, o Auth. Solo incluye headers
    # mínimos para mantener seguridad básica
    # sin bloquear POST externos.
    #########################################

    webhook-open:
      headers:
        contentTypeNosniff: true
        referrerPolicy: "no-referrer"

    # -------------------------------------------------------------------------
    # 🧬 Combinado: Autenticación + headers relajados para frontends
    # -------------------------------------------------------------------------
    combined-auth-relaxed:
      chain:
        middlewares:
          - core-auth
          - secure-relaxed
