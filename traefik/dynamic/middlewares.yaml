# ./traefik/middlewares.yaml
#
# 🔧 Dynamic middlewares for Traefik (mounted via --providers.file.filename)
# Use with:
#   - ./traefik/middlewares.yaml:/etc/traefik/dynamic/middlewares.yaml:ro
#   - "--providers.file.filename=/etc/traefik/dynamic/middlewares.yaml"
#
# 🧠 TIP: You can use environment variables with Go templates, e.g. {{ env "DOMAIN_NAME" }}
# -----------------------------------------------------------------------------
http:
  middlewares:

    # 🔐 Encadenado para proteger servicios internos
    core-protected:
      chain:
        middlewares:
          - core-auth
          - core-secure

    n8n-protected:
      chain:
        middlewares:
          - core-auth
          - secure-relaxed

    media-public:
      chain:
        middlewares:
          - secure-basic
          - block-trackers
    # -------------------------------------------------------------------------
    # 🔐 Shared ForwardAuth – delegates auth to Core microservice
    # -------------------------------------------------------------------------
    core-auth:
      forwardAuth:
        address: "https://core.leonobitech.com/security/verify-admin"
        trustForwardHeader: true
        authRequestHeaders:
          - "Cookie"
          - "X-Forwarded-For"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Role"
          - "Set-Cookie"
        addAuthCookiesToResponse:
          - "accessKey"
          - "clientKey"
    # -------------------------------------------------------------------------
    # 🔐 CSP personalizada para Core – permite credenciales desde frontend
    # -------------------------------------------------------------------------
    core-secure:
      headers:
        STSSeconds: 315360000                       # 10 años de HSTS
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"        # Solo aplica si usás redirect host
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: >-
          geolocation=(), microphone=(), camera=(), fullscreen=(self), payment=()
        contentSecurityPolicy: >-
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          connect-src *;
          img-src * data:;
          frame-ancestors 'self';
    # -------------------------------------------------------------------------
    # 🛡️ Strict headers – ideal for APIs or services without frontend
    # No inline JS, no external connections
    # -------------------------------------------------------------------------
    secure-strict:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; frame-ancestors 'none';"

    # -------------------------------------------------------------------------
    # 🛡️ Relaxed headers – allow inline JS and wide connect/img support
    # Use for frontends like n8n, Odoo, Baserow UI
    # -------------------------------------------------------------------------
    secure-relaxed:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"
        contentSecurityPolicy: >-
          script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://static.cloudflareinsights.com https://cdn.rs.n8n.io https://ph.n8n.io https://sentry.com;
          style-src 'self' 'unsafe-inline';
          img-src * data:;
          connect-src * blob: https://sentry.com https://static.cloudflareinsights.com;
          frame-ancestors 'self';

    # -------------------------------------------------------------------------
    # 🛡️ Basic headers – no CSP, for media or public assets
    # -------------------------------------------------------------------------
    secure-basic:
      headers:
        STSSeconds: 315360000
        forceSTSHeader: true
        STSIncludeSubdomains: true
        STSPreload: true
        SSLHost: "leonobitech.com"
        browserXSSFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "no-referrer"

    # -------------------------------------------------------------------------
    # 📵 Anti-tracking policy – optional for public pages/assets
    # -------------------------------------------------------------------------
    block-trackers:
      headers:
        customResponseHeaders:
          X-Blocked-By: "Traefik"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; connect-src 'self';"
