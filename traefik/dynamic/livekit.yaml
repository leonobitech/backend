# ./traefik/dynamic/livekit.yaml
#
# 🎙️ LiveKit Server — Self-hosted WebRTC signaling
# Routes wss://lk.leonobitech.com -> http://livekit_server:7880
# LiveKit runs on leonobitech-net bridge, Traefik reaches it by container name
# WebRTC media (UDP 50000-50100) and TURN (UDP 443) are port-mapped to host
# -----------------------------------------------------------------------------

http:
  routers:
    livekit:
      rule: "Host(`lk.leonobitech.com`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: livekit

  services:
    livekit:
      loadBalancer:
        servers:
          - url: "http://livekit_server:7880"
