# ./traefik/dynamic/livekit.yaml
#
# 🎙️ LiveKit Server — Self-hosted WebRTC signaling
# Routes wss://lk.leonobitech.com -> http://host:7880
# LiveKit runs in host mode, Traefik reaches it via host.docker.internal
# WebRTC media and TURN bind directly to host network
# -----------------------------------------------------------------------------

http:
  routers:
    livekit:
      rule: "Host(`lk.leonobitech.com`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      middlewares:
        - rate-limit-strict@file
        - ws-safe@file
      service: livekit

  services:
    livekit:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:7880"
