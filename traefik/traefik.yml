log:
  level: INFO

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false

certificatesResolvers:
  le:
    acme:
      email: ${SSL_EMAIL}
      storage: /acme.json
      httpChallenge:
        entryPoint: web

# 🛡️ Middlewares globales definidos aquí si deseás reusarlos entre servicios
# (Este bloque es opcional si los defines por labels en docker-compose)
http:
  middlewares:
    block-trackers:
      headers:
        customResponseHeaders:
          X-Blocked-By: "Traefik"
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self';"
