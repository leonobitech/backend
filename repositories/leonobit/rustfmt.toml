# ===========================
#   rustfmt.toml (nightly)
# ===========================

# Máximo ancho de línea
max_width = 120
comment_width = 120

# Reordenar módulos y métodos automáticamente
reorder_modules = true
reorder_impl_items = true

# Agrupar imports por crate, orden alfabético, limpio y compacto
imports_granularity = "Module"
group_imports = "StdExternalCrate"

# Usar comas finales en listas multilínea → diffs más limpios
trailing_comma = "Vertical"

# Estilo de llaves para bloques de control flow
control_brace_style = "AlwaysSameLine"

# Indentación estándar Rust
tab_spaces = 2

# Parámetros de funciones largas en columnas para mayor legibilidad
fn_params_layout = "Tall"

# Quita paréntesis anidados innecesarios
remove_nested_parens = true
