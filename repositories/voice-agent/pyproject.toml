[tool.setuptools]
py-modules = ["agent", "tts_piper"]

[project]
name = "voice-agent"
version = "0.1.0"
description = "Voice AI agent for Leonobitech - LiveKit + Deepgram + Piper/ElevenLabs + Claude"
requires-python = ">=3.11"
dependencies = [
    "livekit-agents[anthropic,silero,mcp]~=1.5",
    "python-dotenv",
]

[project.optional-dependencies]
local = [
    "faster-whisper",
    "piper-tts",
    "numpy",
]
cloud = [
    "livekit-plugins-deepgram~=1.5",
    "livekit-plugins-elevenlabs~=1.5",
    "livekit-plugins-bey~=1.0",
    "livekit-plugins-turn-detector~=1.5",
]

[project.scripts]
start = "agent:server"
