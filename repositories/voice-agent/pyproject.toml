[project]
name = "voice-agent"
version = "0.1.0"
description = "Voice AI agent for Leonobitech - LiveKit + Deepgram + ElevenLabs + Claude"
requires-python = ">=3.11"
dependencies = [
    "livekit-agents[anthropic,silero,turn-detector,noise-cancellation,mcp]~=1.3",
    "python-dotenv",
]

[project.optional-dependencies]
local = [
    "faster-whisper",
    "piper-tts",
    "numpy",
]
cloud = [
    "livekit-plugins-deepgram~=1.3",
    "livekit-plugins-elevenlabs~=1.3",
]

[project.scripts]
start = "agent:server"
