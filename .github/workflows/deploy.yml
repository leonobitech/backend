name: 🚀 Deploy to Production - Main

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📦 Checkout repo
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_DEPLOY_KEY }}

      - name: 🚀 Ejecutar deploy.sh via ci → len
        run: |
          echo "🟢 Conectando a VPS como usuario 'ci'..."
          ssh -p 2222 -A -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            echo "📡 Conectando desde ci@ a len@localhost para ejecutar el script deploy.sh..."

            ssh -p 2222 \
              -o IdentitiesOnly=yes \
              -o PreferredAuthentications=publickey \
              len@localhost << 'EOC'
                echo "✅ Ejecutando deploy.sh como 'len'..."
                bash /home/len/scripts/deploy.sh
              EOC

          EOF


# Este workflow se conecta al usuario 'len' del VPS a través del usuario 'ci'
# usando una clave SSH que está restringida a ejecutar un único script de deploy.
# El script en /home/len/scripts/deploy.sh realiza:
# - git pull
# - docker compose pull y up
# - limpieza
# - y envío de email con el resultado del deploy
# Seguridad reforzada con:
# - SSH en puerto 2222
# - Fail2Ban
# - OTP para len
# - PublicKey restricta para ci con "command=..."
# - Sin PTY ni reenvíos SSH
